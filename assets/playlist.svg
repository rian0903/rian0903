<svg xmlns="http://www.w3.org/2000/svg" width="450" height="300" viewBox="0 0 450 300">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26" />
      <stop offset="100%" stop-color="#16161e" />
    </linearGradient>
  </defs>

  <!-- Border & Background -->
  <rect x="2" y="2" width="446" height="296" rx="12" fill="url(#bg)" stroke="#bb9af7" stroke-width="2.5" />

  <!-- Header Section -->
  <!-- Playlist Icon (glowing circle + music note) -->
  <circle cx="45" cy="45" r="20" fill="#ff007c" opacity="0.2" />
  <circle cx="45" cy="45" r="16" fill="#ff007c" />
  <!-- Music Note Path -->
  <path d="M42 37 v12 a3 3 0 0 1 -3 3 a3 3 0 0 1 -3 -3 a3 3 0 0 1 3 -3 c1.5 0 3 .5 3 1.5 v-9.5 l8 -2 v7 a3 3 0 0 1 -3 3 a3 3 0 0 1 -3 -3 a3 3 0 0 1 3 -3 c1.5 0 3 .5 3 1.5 v-8.5 z" fill="#ffffff" />

  <!-- Playlist Info -->
  <text x="80" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#7abcff">Tokyo Night Vibes</text>
  <text x="80" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a9b1d6">Curated Coding Playlist • 5 Songs</text>

  <!-- Playlist Cover Art (Equalizer effect) -->
  <rect x="380" y="25" width="45" height="45" rx="6" fill="#1f2335" stroke="#73daca" stroke-width="1.5" />
  <rect x="390" y="38" width="3" height="18" fill="#73daca" rx="1" />
  <rect x="396" y="30" width="3" height="26" fill="#73daca" rx="1" />
  <rect x="402" y="34" width="3" height="22" fill="#73daca" rx="1" />
  <rect x="408" y="40" width="3" height="16" fill="#73daca" rx="1" />

  <!-- Divider Line -->
  <line x1="20" y1="85" x2="430" y2="85" stroke="#24283b" stroke-width="1.5" />

  <!-- Song Rows -->
  <!-- Song 1 -->
  <g transform="translate(0, 95)">
    <text x="25" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#73daca">1</text>
    <text x="50" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#c0caf5">After Hours</text>
    <text x="50" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#565f89">The Weeknd</text>
    <text x="400" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a9b1d6">4:20</text>
  </g>

  <!-- Song 2 -->
  <g transform="translate(0, 135)">
    <text x="25" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#73daca">2</text>
    <text x="50" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#c0caf5">Resonance</text>
    <text x="50" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#565f89">HOME</text>
    <text x="400" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a9b1d6">3:32</text>
  </g>

  <!-- Song 3 -->
  <g transform="translate(0, 175)">
    <text x="25" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#73daca">3</text>
    <text x="50" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#c0caf5">Starboy</text>
    <text x="50" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#565f89">The Weeknd</text>
    <text x="400" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a9b1d6">3:50</text>
  </g>

  <!-- Song 4 -->
  <g transform="translate(0, 215)">
    <text x="25" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#73daca">4</text>
    <text x="50" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#c0caf5">Midnight City</text>
    <text x="50" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#565f89">M83</text>
    <text x="400" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a9b1d6">4:03</text>
  </g>

  <!-- Song 5 -->
  <g transform="translate(0, 255)">
    <text x="25" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#73daca">5</text>
    <text x="50" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#c0caf5">Nightcall</text>
    <text x="50" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#565f89">Kavinsky</text>
    <text x="400" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a9b1d6">4:18</text>
  </g>
</svg>
